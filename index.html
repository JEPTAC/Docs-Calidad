<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Editor EI V22 Stable Arrow Core</title><style>
:root{
  --ei-blue:#00378A; --ei-yellow:#EAC800; --ei-gray:#A4A8AB;
  --paper-w:11in; --paper-h:8.5in; --inner-x:.39in; --inner-y:.33in;
  --footer-h:.34in; --header-h:.92in; --flow-head-h:.18in;
  --proc-col-w:.75in; --role-col-w:.57in;
  --font:"Century Gothic","Aptos","Montserrat",Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:var(--font);background:#eef2f6;color:#12233a}
button,input,textarea,select{font-family:inherit}
button,.file-btn{border:0;background:#e7edf6;color:#0f253d;border-radius:10px;padding:8px 10px;font-weight:800;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;justify-content:center;gap:4px}
button:hover,.file-btn:hover{filter:brightness(.96)}
button.active{background:#b9d4ff;box-shadow:0 0 0 2px rgba(0,55,138,.18) inset}
button.primary{background:var(--ei-yellow);color:#001e4d}
button.danger{background:#ffd8d3;color:#7a1209}
.app{display:grid;grid-template-columns:390px 1fr;min-height:100vh}
.side{background:#0c1e34;color:#fff;padding:14px;overflow:auto;max-height:100vh}
.brand{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:10px;margin-bottom:12px}
.brand img{width:112px;background:#fff;border-radius:8px;padding:5px}
.brand strong{display:block}.brand span{font-size:12px;color:#c5d2e4}
.panel{background:#142b49;border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:13px;margin:12px 0}
.panel h2{margin:0 0 10px;font-size:14px;color:var(--ei-yellow);text-transform:uppercase;letter-spacing:.03em}
label{display:block;font-size:12px;color:#dce8f5;font-weight:800;margin:8px 0 4px}
input,textarea,select{width:100%;border:1px solid #365b84;background:#06192b;color:#fff;border-radius:10px;padding:8px;outline:none}
input[type=color]{height:36px;padding:2px}
textarea{resize:vertical}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.actions{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.palette{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.page-list{display:flex;flex-direction:column;gap:6px}
.page-item{display:flex;justify-content:space-between;align-items:center;background:#06192b;border:1px solid #365b84;border-radius:10px;padding:8px;cursor:pointer}
.page-item.active{border-color:var(--ei-yellow);box-shadow:0 0 0 2px rgba(234,200,0,.2)}
.lane-row{display:grid;grid-template-columns:1fr 1fr 28px;gap:6px;align-items:end;margin-bottom:7px}
.lane-row button{padding:7px;background:#ffd8d3;color:#7a1209}
.hint{font-size:13px;color:#c9d6e5;line-height:1.45}
.main{display:grid;grid-template-rows:auto 1fr;min-width:0}
.toolbar{position:sticky;top:0;z-index:60;background:#fff;border-bottom:1px solid #d7dde7;padding:10px 14px;display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.group{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding-right:8px;border-right:1px solid #dde4ee}
.group:last-child{border-right:0}
.workarea{overflow:auto;padding:28px;display:flex;justify-content:center;align-items:flex-start}
.pages{display:flex;flex-direction:column;gap:28px;align-items:center;transform-origin:top center}
.qa-box{position:fixed;right:22px;top:75px;width:430px;max-height:70vh;overflow:auto;background:#fff;border:1px solid #d7dde7;border-radius:16px;box-shadow:0 12px 32px rgba(0,0,0,.18);z-index:100;padding:14px}
.qa-box h3{margin:0 0 10px;color:var(--ei-blue)}
.qa-pass{color:#087a34;font-weight:800}.qa-fail{color:#b00020;font-weight:800}
.proc-page{width:var(--paper-w);height:var(--paper-h);background:#fff;position:relative;overflow:hidden;box-shadow:0 12px 34px rgba(0,0,0,.24);flex:0 0 auto}
.proc-page::before{content:"";position:absolute;left:var(--inner-x);top:var(--inner-y);right:var(--inner-x);bottom:var(--footer-h);border:1.3px solid #111;z-index:1;pointer-events:none}
.proc-inner{position:absolute;left:var(--inner-x);top:var(--inner-y);right:var(--inner-x);bottom:var(--footer-h);background:#fff;z-index:2}
.proc-header{height:var(--header-h);display:grid;grid-template-columns:2.55in 1fr 1.18in;border-bottom:1.3px solid #111}
.logo-cell{display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;background:#fff}
.logo-cell::after{content:"";position:absolute;right:-.44in;top:-.12in;width:.88in;height:1.16in;background:#fff;border-radius:50%;z-index:3}
.logo-cell img{max-width:2.18in;max-height:.64in;object-fit:contain;z-index:4}
.title-cell,.meta-cell{background:linear-gradient(#003f9c,#00378A 72%,#002e74)}
.title-cell{display:flex;align-items:center;justify-content:center;text-align:center;color:var(--ei-yellow);font-weight:900;font-size:.13in;line-height:1.15;text-transform:uppercase;padding:0 .16in}
.meta-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:.14in;line-height:1.15}
.flow-template,.narrative-template{height:calc(100% - var(--header-h));position:relative;display:block;border-bottom:1.3px solid #111;overflow:hidden}
.flow-head{height:var(--flow-head-h);display:grid;grid-template-columns:calc(var(--proc-col-w) + var(--role-col-w)) 1fr;border-bottom:1.3px solid #111;color:var(--ei-blue);font-size:.085in;font-weight:900;text-transform:uppercase}
.flow-head>div{display:flex;align-items:center;justify-content:center}.resp-title{border-right:1.3px solid #111}
.flow-body{height:calc(100% - var(--flow-head-h));display:grid;grid-template-columns:var(--proc-col-w) var(--role-col-w) 1fr;position:relative}
.proc-col,.role-col{position:relative;border-right:1.3px solid #111;background:#fff}
.lane-cell{position:absolute;left:0;right:0;border-bottom:1.3px solid #111;display:flex;align-items:center;justify-content:center;overflow:hidden}
.lane-cell:last-child{border-bottom:0}
.lane-text{writing-mode:vertical-rl;transform:rotate(180deg);font-weight:900;font-size:.09in;text-align:center;line-height:1.05}
.flow-area{position:relative;overflow:hidden;background:#fff}
.flow-area.grid-on{background-image:linear-gradient(to right,rgba(0,55,138,.08) 1px,transparent 1px),linear-gradient(to bottom,rgba(0,55,138,.08) 1px,transparent 1px);background-size:20px 20px}
.lane-line{position:absolute;left:0;right:0;border-bottom:1.3px solid #111;z-index:1;pointer-events:none}
.flow-svg{position:absolute;inset:0;width:100%;height:100%;z-index:5;user-select:none}
.proc-footer{position:absolute;left:var(--inner-x);right:var(--inner-x);bottom:.08in;height:.24in;display:flex;align-items:center;justify-content:space-between;color:var(--ei-gray);font-size:.13in;font-weight:900;z-index:4}
.narrative-titlebar{height:.20in;border-bottom:1.3px solid #111;color:var(--ei-blue);font-weight:900;font-size:.105in;display:flex;align-items:center;justify-content:center}
.narrative-content{height:calc(100% - .20in);padding:.06in .18in;overflow:hidden;font-size:.112in;line-height:1.18}
.narrative-grid{display:grid;grid-template-columns:1fr 1fr;gap:.22in}
.narrative-content strong{color:var(--ei-blue)}
.narrative-grid p{margin:.05in 0}.narrative-grid ul{margin:.04in 0 0 .22in;color:var(--ei-blue);font-weight:700}
.shape-group{cursor:move;pointer-events:auto}
.shape-outline{filter:drop-shadow(1px 2px 1px rgba(0,0,0,.22))}
.select-ring{display:none;fill:none;stroke:#ff8a00;stroke-width:2;stroke-dasharray:5 4}
.node-selected .select-ring{display:block}
.resize-handle{display:none;fill:#fff;stroke:#ff8a00;stroke-width:1.5;cursor:nwse-resize}
.node-selected .resize-handle{display:block}
.anchor-dot{display:none;fill:#fff;stroke:#0084ff;stroke-width:1.6;pointer-events:none}
.node-selected .anchor-dot{display:block}
.node-text{font-family:Century Gothic,Arial,sans-serif;text-anchor:middle;dominant-baseline:middle;pointer-events:none}
.terminal-text{fill:#fff;font-weight:900;font-size:12px}.small-node-text{font-size:10px}.activity-text{font-size:10px}
.verb{fill:var(--ei-blue);font-weight:900}.rest{fill:#111;font-weight:500}
.edge-path{fill:none;stroke:#222;stroke-width:1.6;pointer-events:stroke}
.edge-hit{fill:none;stroke:rgba(0,0,0,0);stroke-width:20;pointer-events:stroke;cursor:move}
.edge-selected{stroke:#ff8a00!important;stroke-width:2.5!important}
.edge-label{font-size:12px;font-weight:900;fill:var(--ei-blue);cursor:text}
.edge-vertex{fill:#fff;stroke:#ff8a00;stroke-width:2;cursor:move}
.edge-end{fill:#fff;stroke:#00a1ff;stroke-width:2.2;cursor:crosshair}
.edge-mid{fill:#fff;stroke:#0084ff;stroke-width:1.5;cursor:copy}
.edge-segment{fill:#fff;stroke:#7b3ff2;stroke-width:1.7;cursor:move}
.marquee{fill:rgba(0,89,255,.08);stroke:#1f75ff;stroke-width:1;stroke-dasharray:5 4}
@page{size:letter landscape;margin:0}
@media print{
  body{background:#fff}.no-print,.side,.toolbar,.qa-box{display:none!important}.app{display:block}.main{display:block}.workarea{display:block;padding:0;overflow:visible}.pages{transform:none!important;display:block}.proc-page{box-shadow:none;margin:0;width:11in;height:8.5in;break-after:page;page-break-after:always}.proc-page:last-child{break-after:auto;page-break-after:auto}
}
</style></head><body>

function uid(){return'id'+Math.random().toString(36).slice(2,9)}
function clone(o){return JSON.parse(JSON.stringify(o))}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function normColor(c){c=String(c||'#222222').trim();if(/^#[0-9a-fA-F]{6}$/.test(c))return c;if(/^#[0-9a-fA-F]{3}$/.test(c))return '#'+c[1]+c[1]+c[2]+c[2]+c[3]+c[3];return '#222222'}
function cleanPoints(points){return(points||[]).filter(p=>p&&Number.isFinite(+p.x)&&Number.isFinite(+p.y)).map(p=>({x:+p.x,y:+p.y}))}
function snap(v){return state.snap?Math.round(v/SNAP)*SNAP:v}
function activePage(){return state.pages[state.activePage]}
function isFlow(p=activePage()){return p&&p.type==='flow'}
function pushHistory(){history.push(clone({...state,selected:[],selectedEdge:null}));if(history.length>150)history.shift();future=[]}
function restore(s){state=s;state.selected=[];state.selectedEdge=null;renderAll()}

function node(type,text,x,y,lane=0){let n={id:uid(),type,text,x,y,w:112,h:58,lane};setSize(n);return n}
function setSize(n){const m={start:[66,28],end:[66,28],activity:[112,58],decision:[88,88],document:[118,66],delay:[92,58],offpage:[36,44],samepage:[32,32],text:[120,36],note:[120,72],subprocess:[126,62],database:[108,68],manual:[118,56],input:[118,58]};[n.w,n.h]=m[n.type]||[112,58]}

function edgeBetween(p,from,to,label=''){
  const a=p.nodes.find(n=>n.id===from), b=p.nodes.find(n=>n.id===to);
  const [sa,ea]=bestAnchors(a,b), midX=(sa.pt.x+ea.pt.x)/2;
  return {id:uid(),kind:'edge',label,mode:'orthogonal',color:'#222222',width:1.6,style:'solid',arrow:'end',
    start:{attached:true,nodeId:from,side:sa.side,point:sa.pt},
    end:{attached:true,nodeId:to,side:ea.side,point:ea.pt},
    vertices:[{x:midX,y:sa.pt.y},{x:midX,y:ea.pt.y}]
  }
}
function freeEdge(x1,y1,x2,y2){return {id:uid(),kind:'edge',label:'',mode:'orthogonal',color:'#222222',width:1.6,style:'solid',arrow:'end',
  start:{attached:false,point:{x:x1,y:y1}},end:{attached:false,point:{x:x2,y:y2}},vertices:[]}}

function renderLaneEditor(){const p=activePage(),pan=$('lanesPanel');pan.style.display=isFlow(p)?'':'none';if(!isFlow(p))return;const box=$('laneEditor');box.innerHTML='';p.lanes.forEach((l,i)=>{const r=document.createElement('div');r.className='lane-row';r.innerHTML=`<label>Proceso<input value="${esc(l.process)}" data-i="${i}" data-k="process"></label><label>Cargo<input value="${esc(l.role)}" data-i="${i}" data-k="role"></label><button data-del="${i}">×</button>`;box.appendChild(r)});box.querySelectorAll('input').forEach(inp=>inp.onchange=e=>{pushHistory();p.lanes[+e.target.dataset.i][e.target.dataset.k]=e.target.value;renderAll()});box.querySelectorAll('button').forEach(b=>b.onclick=()=>{if(p.lanes.length<=1)return;pushHistory();p.lanes.splice(+b.dataset.del,1);p.nodes.forEach(n=>n.lane=clamp(n.lane,0,p.lanes.length-1));renderAll()})}
function renderInspector(){const p=activePage(),box=$('inspector');if(!isFlow(p)){box.innerHTML='Página narrativa editable directamente.';return}
 if(state.selectedEdge){const e=p.edges.find(x=>x.id===state.selectedEdge);if(!e){box.innerHTML='Flecha no encontrada.';return}box.innerHTML=`<label>Etiqueta<input id="edgeLabel" value="${esc(e.label||'')}"></label><div class="grid2"><label>Estilo<select id="edgeStyle"><option value="solid">Continua</option><option value="dashed">Guiones</option><option value="dotted">Puntos</option></select></label><label>Modo<select id="edgeMode"><option value="orthogonal">Ortogonal</option><option value="straight">Recta</option></select></label></div><div class="grid2"><label>Grosor<input id="edgeWidth" type="number" min="1" max="8" step=".2" value="${e.width||1.6}"></label><label>Color<input id="edgeColor" type="color" value="${normColor(e.color)}"></label></div><div class="grid2"><label>Punta<select id="edgeArrow"><option value="end">Final</option><option value="none">Sin punta</option></select></label><label>Vértices<input value="${rawPoints(p,e).length}" disabled></label></div><div class="actions"><button id="addBend">+ Vértice</button><button id="disconnectEdge">Desconectar</button><button id="clearBends">Limpiar vértices</button><button id="reverseEdge">Invertir</button></div><p class="hint">Motor V22: cada flecha tiene sus propios puntos. Arrastrar una flecha no modifica otras ni reordena todas.</p>`;$('edgeStyle').value=e.style||'solid';$('edgeMode').value=e.mode||'orthogonal';$('edgeArrow').value=e.arrow||'end';
   $('edgeLabel').onchange=ev=>{pushHistory();e.label=ev.target.value;renderAll()};$('edgeStyle').onchange=ev=>{pushHistory();e.style=ev.target.value;renderAll()};$('edgeMode').onchange=ev=>{pushHistory();e.mode=ev.target.value;renderAll()};$('edgeWidth').onchange=ev=>{pushHistory();e.width=+ev.target.value||1.6;renderAll()};$('edgeColor').onchange=ev=>{pushHistory();e.color=normColor(ev.target.value);renderAll()};$('edgeArrow').onchange=ev=>{pushHistory();e.arrow=ev.target.value;renderAll()};
   $('addBend').onclick=()=>{pushHistory();const pts=resolvedPoints(p,e),m=pts[Math.floor(pts.length/2)]||{x:200,y:200};e.vertices.push({x:snap(m.x+20),y:snap(m.y+20)});renderAll()};$('disconnectEdge').onclick=()=>{pushHistory();const raw=rawPoints(p,e);e.start={attached:false,point:clone(raw[0])};e.end={attached:false,point:clone(raw.at(-1))};renderAll()};$('clearBends').onclick=()=>{pushHistory();e.vertices=[];renderAll()};$('reverseEdge').onclick=()=>{pushHistory();const s=clone(e.start);e.start=clone(e.end);e.end=s;e.vertices.reverse();renderAll()};return}
 if(state.selected.length){const n=p.nodes.find(x=>x.id===state.selected[0]);box.innerHTML=`<label>Tipo<select id="nodeType">${['start','activity','decision','document','delay','offpage','samepage','end','text','note','subprocess','database','manual','input'].map(t=>`<option value="${t}" ${n.type===t?'selected':''}>${t}</option>`).join('')}</select></label><label>Texto<textarea id="nodeText" rows="3">${esc(n.text)}</textarea></label><label>Carril<select id="nodeLane">${p.lanes.map((l,i)=>`<option value="${i}" ${n.lane===i?'selected':''}>${l.process} | ${l.role}</option>`).join('')}</select></label><div class="grid2"><label>Ancho<input id="nodeW" type="number" value="${Math.round(n.w)}"></label><label>Alto<input id="nodeH" type="number" value="${Math.round(n.h)}"></label></div><div class="grid2"><label>X<input id="nodeX" type="number" value="${Math.round(n.x)}"></label><label>Y<input id="nodeY" type="number" value="${Math.round(n.y)}"></label></div>`;$('nodeType').onchange=ev=>{pushHistory();n.type=ev.target.value;setSize(n);renderAll()};$('nodeText').onchange=ev=>{pushHistory();n.text=ev.target.value;renderAll()};$('nodeLane').onchange=ev=>{pushHistory();n.lane=+ev.target.value;n.y=(n.lane+.5)*(FLOW_H/p.lanes.length)-n.h/2;renderAll()};[['nodeW','w'],['nodeH','h'],['nodeX','x'],['nodeY','y']].forEach(([id,k])=>$(id).onchange=ev=>{pushHistory();n[k]=+ev.target.value||n[k];renderAll()});return}
 box.innerHTML='Selecciona una figura o flecha.'
}

function addLane(){if(!isFlow())return;pushHistory();activePage().lanes.push({process:'PROCESO',role:'Responsable / Cargo'});renderAll()}
function addFlowPage(){pushHistory();state.pages.push({id:uid(),type:'flow',lanes:[{process:'PROCESO',role:'Responsable / Cargo'}],nodes:[],edges:[]});state.activePage=state.pages.length-1;renderAll()}
function addNarrPage(){pushHistory();state.pages.push({id:uid(),type:'narrative',html:'<div class="narrative-grid"><div><p><strong>Objetivo:</strong></p><p><strong>Alcance:</strong></p></div><div><p><strong>Documentos relacionados:</strong></p><ul><li>X-X-X</li></ul></div></div>'});state.activePage=state.pages.length-1;renderAll()}
function dupPage(){pushHistory();const cp=clone(activePage());cp.id=uid();state.pages.splice(state.activePage+1,0,cp);state.activePage++;renderAll()}
function delPage(){if(state.pages.length<=1)return;pushHistory();state.pages.splice(state.activePage,1);state.activePage=Math.max(0,state.activePage-1);renderAll()}
function duplicateSelection(){if(!isFlow()||!state.selected.length)return;pushHistory();const p=activePage(),ids=[];state.selected.forEach(id=>{const n=clone(p.nodes.find(x=>x.id===id));n.id=uid();n.x+=25;n.y+=25;p.nodes.push(n);ids.push(n.id)});state.selected=ids;renderAll()}
function copySelection(){if(!isFlow()||!state.selected.length)return;const p=activePage();clipboard={nodes:p.nodes.filter(n=>state.selected.includes(n.id)).map(clone),edges:[]}}
function pasteSelection(){if(!isFlow()||!clipboard)return;pushHistory();const p=activePage(),ids=[];clipboard.nodes.forEach(old=>{const n=clone(old);n.id=uid();n.x+=30;n.y+=30;p.nodes.push(n);ids.push(n.id)});state.selected=ids;renderAll()}
function deleteSelection(){const p=activePage();if(!isFlow(p))return;if(state.selectedEdge){pushHistory();p.edges=p.edges.filter(e=>e.id!==state.selectedEdge);state.selectedEdge=null;renderAll();return}if(state.selected.length){pushHistory();const s=new Set(state.selected);p.nodes=p.nodes.filter(n=>!s.has(n.id));p.edges=p.edges.filter(e=>!(e.start.attached&&s.has(e.start.nodeId))&&!(e.end.attached&&s.has(e.end.nodeId)));state.selected=[];renderAll()}}
function align(mode){if(!isFlow()||state.selected.length<2)return;pushHistory();const ns=activePage().nodes.filter(n=>state.selected.includes(n.id));if(mode==='left'){const x=Math.min(...ns.map(n=>n.x));ns.forEach(n=>n.x=x)}if(mode==='center'){const cx=ns.reduce((a,n)=>a+n.x+n.w/2,0)/ns.length;ns.forEach(n=>n.x=cx-n.w/2)}if(mode==='right'){const r=Math.max(...ns.map(n=>n.x+n.w));ns.forEach(n=>n.x=r-n.w)}if(mode==='top'){const y=Math.min(...ns.map(n=>n.y));ns.forEach(n=>n.y=y)}if(mode==='middle'){const cy=ns.reduce((a,n)=>a+n.y+n.h/2,0)/ns.length;ns.forEach(n=>n.y=cy-n.h/2)}if(mode==='bottom'){const b=Math.max(...ns.map(n=>n.y+n.h));ns.forEach(n=>n.y=b-n.h)}renderAll()}
function distribute(axis){if(!isFlow()||state.selected.length<3)return;pushHistory();const ns=activePage().nodes.filter(n=>state.selected.includes(n.id)).sort((a,b)=>axis==='h'?a.x-b.x:a.y-b.y);const first=axis==='h'?ns[0].x:ns[0].y,last=axis==='h'?ns.at(-1).x:ns.at(-1).y,step=(last-first)/(ns.length-1);ns.forEach((n,i)=>{if(axis==='h')n.x=first+i*step;else n.y=first+i*step});renderAll()}
function bringFront(){if(!isFlow()||!state.selected.length)return;pushHistory();const p=activePage(),sel=p.nodes.filter(n=>state.selected.includes(n.id));p.nodes=p.nodes.filter(n=>!state.selected.includes(n.id)).concat(sel);renderAll()}
function sendBack(){if(!isFlow()||!state.selected.length)return;pushHistory();const p=activePage(),sel=p.nodes.filter(n=>state.selected.includes(n.id));p.nodes=sel.concat(p.nodes.filter(n=>!state.selected.includes(n.id)));renderAll()}
function autoLayout(){if(!isFlow())return;pushHistory();const p=activePage(),by={};p.nodes.forEach(n=>(by[n.lane]??=[]).push(n));Object.entries(by).forEach(([lane,arr])=>arr.forEach((n,i)=>{n.x=70+i*145;n.y=(+lane+.5)*(FLOW_H/p.lanes.length)-n.h/2}));renderAll()}
function undo(){if(!history.length)return;future.push(clone(state));restore(history.pop())}
function redo(){if(!future.length)return;history.push(clone(state));restore(future.pop())}
function normalizeState(){(state.pages||[]).forEach(p=>{if(p.type==='flow'){p.nodes=(p.nodes||[]).filter(n=>n&&Number.isFinite(+n.x)&&Number.isFinite(+n.y));p.edges=(p.edges||[]).filter(e=>e&&e.start&&e.end);p.edges.forEach(e=>{e.color=normColor(e.color);e.vertices=cleanPoints(e.vertices);if(!e.mode)e.mode='orthogonal';if(!e.width)e.width=1.6;if(!e.style)e.style='solid';if(!e.arrow)e.arrow='end'})}})}
function saveJson(){download(JSON.stringify(state,null,2),(state.doc.code||'procedimiento')+'.json','application/json')}
function openJson(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);normalizeState();renderAll()}catch(err){alert('JSON inválido')}};r.readAsText(f)}
function exportSvg(){const svg=document.querySelector(`.proc-page[data-page-index="${state.activePage}"] .flow-svg`);if(!svg)return alert('Selecciona una página de flujograma.');download(svg.outerHTML,(state.doc.code||'flujo')+'_flujo.svg','image/svg+xml')}
function exportHtml(){const html='<!doctype html><html><head><meta charset="utf-8"><style>'+document.querySelector('style').innerHTML+'</style></head><body><div class="pages" style="transform:none">'+$('pagesMount').innerHTML+'</div></body></html>';download(html,(state.doc.code||'procedimiento')+'.html','text/html')}
function exportPng(){alert('Para máxima fidelidad usa PDF o SVG. El PNG completo requiere rasterizado de HTML; se deja como salida secundaria para fase posterior.')}
function download(content,name,type){const b=new Blob([content],{type}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),500)}
function runQA(){const out=[];out.push({ok:state.pages.length>0,msg:'Existe al menos una página'});state.pages.forEach((p,idx)=>{if(p.type==='flow'){out.push({ok:p.lanes.length>0,msg:`Pág. ${idx+1}: tiene carriles`});out.push({ok:p.nodes.every(n=>n.x>=0&&n.y>=0&&n.x+n.w<=FLOW_W&&n.y+n.h<=FLOW_H),msg:`Pág. ${idx+1}: figuras dentro del área`});out.push({ok:p.edges.every(e=>rawPoints(p,e).length>=2),msg:`Pág. ${idx+1}: flechas con puntos válidos`});out.push({ok:p.edges.every(e=>/^#[0-9a-fA-F]{6}$/.test(normColor(e.color))),msg:`Pág. ${idx+1}: colores de flecha válidos`})}});return out}
function showQA(){const box=$('qaBox'),res=runQA();box.hidden=false;box.innerHTML='<h3>Examen QA V22</h3>'+res.map(r=>`<p class="${r.ok?'qa-pass':'qa-fail'}">${r.ok?'✓':'•'} ${esc(r.msg)}</p>`).join('')+'<button id="closeQA">Cerrar</button>';$('closeQA').onclick=()=>box.hidden=true}
function init(){bind();normalizeState();renderAll();console.log('V22 stable arrow core loaded',runQA())}
init();
</script>
</body></html>
